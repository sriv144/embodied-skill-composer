name: Feature request
description: Propose a new capability for Embodied Skill Composer
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Which surface would this extend?
      options:
        - Tabletop baseline
        - Warehouse collection task
        - Collaborative assembly task contract
        - Hierarchical team options
        - MARL baselines
        - MuJoCo backend
        - Isaac Lab backend (planned)
        - Perception (oracle / classical-CV / learned)
        - Visualization / playback
        - New runtime profile
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
