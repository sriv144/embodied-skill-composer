name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Tests (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core + RL requirements
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install -r requirements-rl.txt
        shell: bash

      - name: Install package in editable mode
        run: pip install -e .

      - name: Ruff lint
        run: ruff check src tests

      - name: Pytest
        run: pytest -q --basetemp .pytest_tmp
