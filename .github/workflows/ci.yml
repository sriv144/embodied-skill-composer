name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      MUJOCO_GL: osmesa
      PYOPENGL_PLATFORM: osmesa
    steps:
      - uses: actions/checkout@v6
      - name: Install headless MuJoCo rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libosmesa6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci-py311-linux.txt
            requirements*.txt
      - name: Install research dependencies
        run: |
          python -m pip install --require-hashes -r constraints/ci-py311-linux.txt
          python -m pip install --no-build-isolation --no-deps -e ".[construction,construction-rl,dev,rl,sim-coppelia,sim-mujoco]"
      - name: Dependency lock is current
        run: |
          uv pip compile pyproject.toml --extra construction --extra construction-rl --extra dev --extra rl --extra sim-coppelia --extra sim-mujoco --python-platform linux --python-version 3.11 --index https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match --torch-backend cpu --emit-index-url --generate-hashes --no-header --output-file constraints/ci-py311-linux.txt
          git diff --exit-code -- constraints/ci-py311-linux.txt
      - name: Dependency integrity
        run: python -m pip check
      - name: Compile
        run: python -m compileall -q src scripts
      - name: Ruff
        run: python -m ruff check src scripts tests
      - name: Mypy
        run: python -m mypy src scripts
      - name: Tests
        run: python -m pytest -q --cov=embodied_skill_composer --cov-report=term-missing --cov-report=xml

  workbench:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workbench/package-lock.json
      - run: npm ci
      - run: npm run build:static

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/scan_secrets.py
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
