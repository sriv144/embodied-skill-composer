name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Type + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install RL dependencies (CPU torch)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu -r requirements-rl.txt

      - name: Install project
        run: pip install -e .

      - name: Ruff lint
        run: ruff check src tests

      - name: mypy type-check (non-blocking)
        run: mypy src || true

      - name: Pytest
        run: pytest -q --basetemp .pytest_tmp
