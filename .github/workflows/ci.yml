name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (report-only on first rollout)
        run: ruff check src tests --output-format=github
        continue-on-error: true

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-rl.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt
          pip install -r requirements-rl.txt
          pip install pytest

        # PyBullet / MuJoCo / Isaac extras are skipped in CI: those
        # backends are validated locally via the runtime profiles
        # documented in README § GPU runtime check.
      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/src
          ESC_CI: '1'
        run: pytest tests/ -q --maxfail=5 --basetemp=.pytest_tmp
