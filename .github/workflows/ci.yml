name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install runtime + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # RL extras are optional; install if present, otherwise skip so the
          # tabletop / warehouse / planner tests still run.
          if [ -f requirements-rl.txt ]; then pip install -r requirements-rl.txt; fi
          pip install -e . || true

      - name: Ruff (lint)
        run: |
          ruff check src tests || true

      - name: Pytest
        run: |
          python -m pytest -q --basetemp .pytest_tmp
