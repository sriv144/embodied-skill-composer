name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch is large but required by the assembly/RL tests.
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements-rl.txt
          pip install -r requirements.txt
          pip install -e .

      - name: Ruff lint
        run: ruff check src tests

      - name: Pytest
        run: pytest -q --basetemp .pytest_tmp
