name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-compile:
    name: ruff + compileall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Syntax check (py_compile)
        run: python -m compileall -q src tests scripts

  tests:
    name: pytest (informational)
    runs-on: ubuntu-latest
    needs: lint-and-compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Pytest (skip training + mujoco)
        continue-on-error: true
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest -q -k "not training and not mujoco" --basetemp .pytest_tmp
