name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        # Heavy backends (PyBullet, MuJoCo, CUDA wheels) are intentionally not
        # installed in CI — they are optional and require local hardware.
        # The base requirements.txt already pins pytest, ruff, and mypy.
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q
