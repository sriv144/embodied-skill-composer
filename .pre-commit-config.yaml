# Pre-commit hooks for embodied-skill-composer.
#
# Install once locally with:
#   pip install pre-commit
#   pre-commit install
#
# Run manually across the repo with:
#   pre-commit run --all-files
#
# These hooks intentionally do NOT auto-fix on commit. Contributors must
# opt in to fixes (`ruff check --fix`, `ruff format`) so that historical
# code is not silently rewritten without review.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(docs/results/|artifacts/)
      - id: end-of-file-fixer
        exclude: ^artifacts/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: \.ps1$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        # No --fix flag: surface issues in review, do not silently rewrite.
        args: ["--exit-non-zero-on-fix"]
      - id: ruff-format
        args: ["--check"]
