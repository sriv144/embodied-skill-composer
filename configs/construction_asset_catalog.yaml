    source: kenney_modular_buildings
    visual_mesh: assets/third_party/kenney_modular_buildings/models/building-block.obj
    collision_shape: box
    mesh_scale: 0.75
    orientation_rpy_degrees: [0.0, 0.0, 0.0]
    dimensions_m: [0.75, 0.18, 0.75]
