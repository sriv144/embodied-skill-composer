version: 1
sources:
  kenney_modular_buildings:
    title: Kenney Modular Buildings 2.1
    source_url: https://kenney.nl/assets/modular-buildings
    license: CC0-1.0
    local_root: assets/third_party/kenney_modular_buildings
    attribution: Kenney Modular Buildings 2.1
  coppeliasim_bundled_models:
    title: CoppeliaSim Edu bundled model library
    source_url: https://www.coppeliarobotics.com/
    license: CoppeliaSim Edu educational license
    redistributed: false

robots:
  mobile_manipulator:
    source: coppeliasim_bundled_models
    model_path: C:/Program Files/CoppeliaRobotics/CoppeliaSimEdu/models/robots/mobile/KUKA YouBot.ttm
    role: First mobile manipulation prototype; replaceable through the backend contract.

components:
